services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - JWT_SECRET_KEY=slopsoil-fixed-secret-key-change-in-production
    volumes:
      - .:/app
      - /app/frontend
      - ./data:/app/data
      - ./soundboard:/app/soundboard
      # Bind-mount local media directories (set paths in .env, already gitignored)
      - ${MEDIA_MUSIC:-/dev/null}:/media/music:ro
      - ${MEDIA_VIDEO:-/dev/null}:/media/video:ro

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_HOST=backend:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
