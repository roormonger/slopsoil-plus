services:
  slopsoil:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"

    # Load environment variables from .env file
    env_file:
      - .env

    # Persist IPTV source list and SQLite database across container restarts.
    volumes:
      - slopsoil-data:/root/.local/share/slopsoil
      - ./data:/app/data
      - ./soundboard:/app/soundboard
    environment:
      - PORT=3000
      - JWT_SECRET_KEY=slopsoil-fixed-secret-key-change-in-production
    # GPU device for hardware acceleration (Linux only)
    # devices:
    #   - /dev/dri:/dev/dri

volumes:
  slopsoil-data:
