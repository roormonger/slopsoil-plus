[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]

[tool.ruff.lint.per-file-ignores]
# Semicolons are used intentionally in the H.264 SPS/VUI bit-reader to keep
# paired read-write operations on one line for readability.
"cogs/video_player.py" = ["E702"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_return_any = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = ["-ra", "-q", "--strict-markers", "--strict-config"]
filterwarnings = [
    "ignore::DeprecationWarning:discord",
]

[tool.coverage.run]
source = ["."]
omit = ["venv/*", "tests/*", "tools/*"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]
