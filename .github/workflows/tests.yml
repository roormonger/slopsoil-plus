name: Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install "discord.py-self" PyNaCl python-dotenv pytest pytest-asyncio pytest-mock

      - name: Run tests
        run: pytest
